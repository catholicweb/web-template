name: Build and deploy a single site

on:
  workflow_dispatch:
    inputs:
      site_slug:
        description: "Site slug to build and deploy"
        required: true
        type: string

# Public repo: checkout needs no token, and nothing in this workflow talks to
# the GitHub API, so the auto GITHUB_TOKEN is given zero scopes everywhere.
# Repo secrets (CLOUDFLARE_API_TOKEN etc.) are injected regardless of this
# setting — they are scoped to the deploy job only.
permissions: {}

concurrency:
  group: deploy-${{ inputs.site_slug }}
  cancel-in-progress: false

jobs:
  # Validates and locks in the site identity BEFORE any untrusted code runs.
  # The build job below can never override or spoof what gets deployed,
  # because deploy reads needs.prepare.outputs, not anything build produces.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      site_slug: ${{ steps.validate.outputs.site_slug }}
    steps:
      - name: Validate site_slug
        id: validate
        env:
          SITE_SLUG: ${{ inputs.site_slug }}
        run: |
          if ! [[ "$SITE_SLUG" =~ ^[a-z0-9-]{1,63}$ ]]; then
            echo "::error::Invalid site_slug format: $SITE_SLUG"
            exit 1
          fi
          KNOWN=$(curl -sf "https://api.parroquia.app/sites/list" | jq -c '.slugs')
          if ! echo "$KNOWN" | jq -e --arg s "$SITE_SLUG" 'index($s) != null' >/dev/null; then
            echo "::error::Unknown site_slug: $SITE_SLUG"
            exit 1
          fi
          echo "site_slug=$SITE_SLUG" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions: {}   # explicitly zero-scope — no GITHUB_TOKEN usable here either
    # NO SECRETS anywhere in this job. Assume every step from "Fetch site
    # config" onward runs attacker-controlled code (it downloads per-site
    # config that theoretically isn't fully trusted).
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Fetch site config from Worker
        env:
          SITE_SLUG: ${{ needs.prepare.outputs.site_slug }}
        run: node docs/.vitepress/migrate.js download "$SITE_SLUG"

      - name: Run before build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          SITE_SLUG: ${{ needs.prepare.outputs.site_slug }}
          # No API keys / tokens passed here — this step is untrusted by assumption.
        run: npm run docs:before-build

      - name: Build with VitePress
        run: npm run docs:build

      - name: Upload build output
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: docs/.vitepress/dist
          retention-days: 1

  deploy:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions: {}   # GITHUB_TOKEN unused; CF secret below is independent of this
    steps:
      - name: Download build output (pinned to this run's exact artifact)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: dist


      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Use GitHub's expression syntax ${{ }} to inject the variable
          command: pages deploy dist --project-name="${{ needs.prepare.outputs.site_slug }}"
