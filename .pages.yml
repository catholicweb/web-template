    label: "Idioma"
    type: select
    options:
      multiple: true
      creatable: true
      values: ["Español:es", "Català:ca", "Galego:gl", "Euskara:eu", "English:en", "Français:fr", "Deutsch:de", "Italiano:it", "Português:pt", "Română:ro", "العربية:ar", "中文:zh", "Български:bg", "Polski:pl"]

