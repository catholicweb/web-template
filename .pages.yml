      values: ["Roboto", "Open Sans", "Lato", "Montserrat", "Poppins", "Merriweather", "Raleway", "Oswald", "Playfair Display", "Source Sans Pro", "Nunito", "Quicksand", "Work Sans", "Bebas Neue", "Muli", "Roboto Slab", "Lora", "Josefin Sans", "Droid Serif", "Cabin", "Arimo", "Ubuntu", "Zilla Slab", "Tisa", "Anton", "Fira Sans", "Varela Round", "Crimson Pro", "Spectral", "Exo 2", "Bitter", "Archivo", "Dosis", "PT Sans", "Lobster", "Pacifico", "Dancing Script", "Sacramento", "Tangerine", "Unbounded", "Pangolin", "Bree Serif", "Vollkorn", "Monda", "Be Vietnam", "Karla", "Noto Sans", "Kalam"]
  selector:
    label: Selector
    type: select
    options:
      creatable: true
      values: ["h1", "h2", "h3", "h4", "h5", "h6", "p", "img", "blockquote", "a", "ul", "ol", "li", "div", "span", "strong", "em", "br", "hr", "table", "tr", "td", "th", "form", "input", "button", "label", "select", "option", "textarea", "iframe", "header", "footer", "nav", "article", "section", "aside", "details", "summary", "video", "audio", "canvas", "svg"]
  blocktype:
    label: Selector
    type: select
    options:
      creatable: false
      values: ["card-full", "gallery", "resource-list", "video-grid", "hero-banner", "portfolio", "product-cards", "article-list", "team-cards", "compact-list", "text", "timeline", "calendar-cards", "carousel", "accordion"]
  color:
    label: Colors
    type: select
    options:
      creatable: true
      values: ["white", "black", "red", "green", "blue", "yellow", "orange", "purple", "pink", "brown", "gray", "lightgray", "darkgray", "beige", "ivory", "teal", "coral", "slateblue", "rgb(255, 99, 71)", "hsl(180, 100%, 25%)"]
  multiplier:
    label: Multiplier
    type: select
    options:
      creatable: true
      values: ["0.25", "0.5", "0.75", "1", "1.25", "1.50", "2", "4"]
  location:
    label: Lugares
    type: select
    options:
      multiple: true
      creatable: true
      values: ["Albiasu", "Aldatz", "Agustinas Aldatz", "Alli", "Arano", "Arrarats", "Arribe", "Arribe/Atallu", "Arruitz", "Areso", "Astitz", "Atallu", "Azkarate", "Azpirotz", "Baraibar", "Beramendi", "Beruete", "Betelu", "Eraso", "Erbiti", "Errazkin", "Etxaleku", "Etxarri", "Gaintza", "Gartzaron", "Goldaratz", "Goizueta", "Gorriti", "Igoa eta Aizarotz", "Ihaben", "Intza", "Iribas", "Itsaso", "Jauntsarats", "Latasa", "Leitza", "Lekunberri", "Lezaeta", "Madotz", "Mugiro", "Muskitz", "Oderitz", "Orokieta", "Oskotz", "Udabe", "Uitzi", "Urritza", "Uztegi", "Zarrantz"]
  tags:
    label: Options
    type: select
    options:
      multiple: true
      creatable: false
      values: ["dark", "twocol", "small", "tiny", "large", "hidden", "3d", "carousel"]
  rrule:
    label: Fechas
    type: select
    options:
      multiple: true
      values:
        [
          { value: "mo", label: "Lunes" },
          { value: "tu", label: "Martes" },
          { value: "we", label: "Miércoles" },
          { value: "th", label: "Jueves" },
          { value: "fr", label: "Viernes" },
          { value: "sa", label: "Sábado" },
          { value: "su", label: "Domingo" },
          { value: "mo,tu,we,th,fr", label: "Lunes a viernes" },
          { value: "yearly", label: "Anualmente" },
          { value: "monthly", label: "Mensualmente" },
          { value: "biweekly", label: "Cada dos semanas" },
          { value: "week1", label: "1ª semana del mes" },
          { value: "week2", label: "2ª semana del mes" },
          { value: "week3", label: "3ª semana del mes" },
          { value: "week4", label: "4ª semana del mes" },
          { value: "week5", label: "5ª semana del mes" },
        ]
  effect:
    label: Efectos CSS
    type: select
    options:
      creatable: true
      values: ["opacity: 0;", "opacity: 0.5;", "transform: scale(0.8);", "transform: scale(1.2);", "transform: scaleX(1.5);", "transform: scaleY(.5);", "transform: rotate(6deg);", "transform: rotate(-6deg);", "transform: translateX(-20%);", "transform: translateX(20%);", "transform: translateY(-20%);", "transform: translateY(20%);", "transform: translate(-50%, -50%);", "filter: blur(5px);", "filter: brightness(1.2);", "filter: contrast(150%);", "filter: grayscale(100%);", "filter: invert(100%);", "color: rgb(var(--color-accent));"]
  hero:
    label: Hero
    type: object
    fields:
      - { name: title, label: Título, type: string }
      - { name: description, label: Subtitulo, type: string }
      - { name: image, label: Image, type: image }
      - name: elements
        label: Acciones
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title}" } }
        fields:
          - { name: title, label: Título, type: string }
          - { name: link, label: Accion, type: string }
  gallery:
    label: Galleria imagenes
    type: object
    fields:
      - { name: title, label: Título, type: string }
      - { name: description, label: Subtitulo, type: string }
      - name: elements
        label: Elementos
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title}" } }
        fields:
          - { name: title, label: Título, type: string }
          - { name: description, label: Subtitulo, type: string }
          - { name: image, label: Imagen, type: image }
          - { name: type, label: tipo de bloque, component: blocktype }
media:
  input: docs/public/media
  output: /media
  categories: ["image", "document"]
content:
  - name: events
    type: file
    label: Eventos
    format: json
    path: docs/public/pages/events.json
    fields:
      - name: events-funeral
        label: Funerales
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title} - {fields.location} - {fields.date} - {fields.times}" } }
        fields:
          - { name: title, label: Nombre del difunto, type: string }
          - { name: location, label: Ubicación, component: location }
          - { name: date, type: date, label: Fecha del funeral }
          - { name: times, label: Hora del funeral, component: times, options: { multiple: false } }
          - { name: notes, label: Notas sobre el evento (opcional), type: string }
      - name: events-feast
        label: Días especiales
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title} - {fields.date}" } }
        fields:
          - { name: title, type: string, label: "Nombre (ej: Navidad, Pascua...)" }
          - { name: date, type: date, label: Fecha }
          - { name: image, type: image, label: "Image" }
          - { name: notes, label: Notas (opcional), type: string }
          - name: custom
            label: Actos concretos
            list: { collapsible: { collapsed: true, summary: "{fields.location} - {fields.times}" } }
            fields:
              - { name: location, label: Ubicación, component: location }
              - { name: times, label: Hora, component: times }
      - name: events-multidate
        label: Eventos en multiples fechas
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title} - {fields.date}" } }
        fields:
          - { name: title, type: string, label: "Nombre (ej: Navidad, Pascua...)" }
          - { name: image, type: image, label: "Image" }
          - { name: notes, label: Notas (opcional), type: string }
          - name: custom
            label: Actos concretos
            list: { collapsible: { collapsed: true, summary: "{fields.location} - {fields.times} - {fields.date}" } }
            fields:
              - { name: location, label: Ubicación, component: location }
              - { name: times, label: Hora, component: times }
              - { name: date, label: Fecha, type: date  }
      - name: events-mass
        label: Horarios de misas
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.location} - {fields.rrule} - {fields.times}" } }
        fields:
          - { name: title, label: Nombre del difunto, type: string, default: Misa, hidden: true }
          - { name: location, label: Ubicación, component: location }
          - { name: times, label: Horas, component: times }
          - { name: rrule, label: Se repite todos los, component: rrule, default: "Nunca" }
          - { name: except, type: date, label: Excepto, list: { collapsible: { collapsed: true } } }
          - { name: notes, label: Notas sobre el evento (opcional), type: string }
      - name: events-group
        label: Catequesis y grupos
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title} - {fields.location} - {fields.times} - {fields.rrule}" } }
        fields:
          - { name: title, label: Título del evento, type: string }
          - { name: location, label: Ubicación, component: location }
          - { name: rrule, label: Se repite todos los, component: rrule }
          - { name: times, label: Hora, component: times }
          - { name: notes, label: Notas sobre el evento (opcional), type: string }
      - name: events-custom
        label: Otros eventos
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title} - {fields.location} - {fields.date} - {fields.rrule}" } }
        fields:
          - { name: image, label: Image, type: image }
          - { name: title, label: Titulo, type: string }
          - { name: location, label: Ubicación, component: location }
          - { name: date, type: date, label: Fechas, list: { collapsible: { collapsed: true } } }
          - { name: times, label: Horas, component: times, options: { multiple: false } }
          - { name: rrule, label: Se repite todos los, component: rrule, default: "Nunca" }
          - { name: except, type: date, label: Excepto, list: { collapsible: { collapsed: true } } }
          - { name: notes, label: Notas sobre el evento (opcional), type: string }
      - name: default
        label: "Valores por defecto para:"
        type: object
        fields:
          - name: funeral
            label: Funerales
            type: object
            fields:
              - { name: image, label: Imagen, type: image }
              - { name: description, label: Descripción, type: text }
          - name: mass
            label: Horarios de misas
            type: object
            fields:
              - { name: image, label: Imagen, type: image }
              - { name: description, label: Descripción, type: text }
          - name: group
            label: Grupos y Catequesis
            type: object
            fields:
              - { name: image, label: Imagen, type: image }
              - { name: description, label: Descripción, type: text }
          - name: feast
            label: Festividades especiales
            type: object
            fields:
              - { name: image, label: Imagen, type: image }
              - { name: description, label: Descripción, type: text }
      - { name: urls, type: string, list: true, label: Calendarios externos a importar (ej. url de Google Calendar terminada en .ics) }

  - name: pages
    label: Paginas
    type: collection
    subfolders: false
    path: docs/public/pages
    view:
      fields: [image, title]
      primary: title
    filename: "{primary}.md"
    exclude: [.vitepress, public, aviso-legal.md, config.json, events.json]
    fields:
      - { name: title, label: Título, type: string }
      - { name: description, label: Subtitulo, type: string }
      - { name: image, label: Imagen, type: image }
      - { name: hideHero, label: Esconder cabezera por defecto, type: boolean, default: false }
      - name: sections
        label: Secciones de la página
        type: block
        list: { collapsible: { collapsed: true, summary: "{fields.title}" } }
        blocks:
          - name: accordion
            label: FAQ
            fields:
              - { name: title, type: string, label: Titulo sección }
              - name: elements
                label: Preguntas y respuestas
                type: object
                list: { collapsible: { collapsed: true, summary: "{fields.title}" } }
                fields:
                  - { name: title, label: Pregunta, type: string }
                  - { name: html, label: Respuesta, type: rich-text }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: scrollyTelling
            label: Narración interactiva
            fields:
              - { name: title, type: string, label: Titulo sección }
              - name: elements
                label: Viñetas
                type: object
                list: { collapsible: { collapsed: true } }
                fields:
                  - { name: text, label: Texto, type: rich-text }
                  - { name: image, label: Imagen, type: image }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: gallery
            label: Galeria de imagenes
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: list, type: image, label: Seleccion de imagenes, options: { multiple: true } }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: text
            label: Texto
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: html, label: Texto largo, type: rich-text }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: gospel
            label: Evangelio del día
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: readings, label: Mostrar primera/segunda y salmo, type: boolean, default: false }
              - { name: audio, label: Añadir audio, type: boolean, default: false }
              - { name: images, label: Mostrar imagenes, type: boolean, default: true }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: calendar
            label: Eventos
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: filter, label: Filtro. Incluir solo eventos que contengan, type: string }
              - { name: order, label: "Agrupación de eventos (tabla, fila, columna, subfila, notas)", component: ordering }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: video-gospel
            label: Audios Nuevo Testamento
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: video-podcast
            label: Podcast católicos
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: links, label: Podcast, component: podcast }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: video-channel
            label: Canal de Youtube
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: filter, label: Filtro. Incluir solo videos que contengan, type: string }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: town
            label: Lista de pueblos
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: filters, label: Filtros a mostrar, type: select, options: { multiple: true, creatable: true } }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: video
            label: Lista de videos/audios (Youtube/Spotify/...)
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: links, label: Enlaces externos, type: string, list: { collapsible: { collapsed: true } } }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: map
            label: Mapa
            fields:
              - { name: title, type: string, label: Título sección }
              - { name: geo, type: string, label: "Coordenadas (ej: 42.801941, -1.645660)" }
              - { name: name, type: string, label: Nombre }
              - { name: image, type: image, label: Imagen }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: fundraising
            label: Campaña financiación
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: name, type: string, label: "Nombre causa (ej: Nuevo tejado)" }
              - { name: description, type: string, label: Descripcion }
              - { name: raised, type: number, label: Recaudado hasta la fecha }
              - { name: goal, type: number, label: Total a recaudar }
              - { name: action, type: string, label: Nombre acción, hidden: true, default: Donar }
              - { name: image, type: image, label: Imagen }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: hero
            label: Cabezera de sección
            component: hero
          - name: team
            label: Miembros del equipo
            fields:
              - { name: title, type: string, label: Titulo sección }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }
          - name: links
            label: Enlaces internos
            fields:
              - { name: title, type: string, label: Titulo sección }
              - name: links
                label: Enlaces internos
                type: reference
                options: { collection: pages, multiple: true, label: "{title}" }
              - { name: tags, label: Opciones avanzadas de estilo, component: tags }

  - name: config
    type: file
    label: Configuración
    path: docs/public/pages/config.json
    format: json
    fields:
      - { name: title, label: Titulo sitio, type: string }
      - { name: description, label: Description del sitio, type: text }
      - { name: image, label: Imagen del sitio, type: image }
      - { name: icon, label: Icono del sitio, type: image }
      - name: social
        label: Redes sociales, youtube...
        type: string
        list: { collapsible: { collapsed: true } }
      - name: collaborators
        label: Colaboradores
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.name}" } }
        fields:
          - { name: name, label: Nombre, type: string }
          - { name: phonenumber, label: Número de telefono, type: string }
          - { name: email, label: Correo electrónico, type: string }
          - { name: image, label: Image, type: image }
      - name: bank
        label: Bizum y cuentas bancarias
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title}" } }
        fields:
          - { name: title, label: "Nombre (ej: BIZUM/BBVA/...)", type: string }
          - { name: account, label: Número de cuenta/bizum, type: string }
      - name: nav
        label: Menu de navegación
        type: object
        list: { collapsible: { collapsed: true, summary: "{fields.title}" } }
        fields:
          - { name: title, label: Titulo sección, type: string }
          - name: links
            label: Enlaces
            type: reference
            options: { collection: pages, multiple: true, label: "{title}" }
      - name: languages
        label: Idiomas de la web
        component: languages
      - name: theme
        label: Tema visual
        type: object
        fields:
          - { name: bodyFont, label: Tipo de letra del cuerpo (cualquiera de https://fonts.google.com/), component: font }
          - { name: headingFont, label: Tipo de letra de los titulos (cualquiera de https://fonts.google.com/), component: font }
          - { name: accentColor, label: "Color elementos acentuados. Código HEX de https://htmlcolorcodes.com/color-picker/", component: color }
          - { name: accentPrimary, label: "Color secundario. Código HEX de https://htmlcolorcodes.com/color-picker/", component: color }
          - { name: navStyle, label: Estilo de la barrra de navegación, type: string }
          - name: styles
            label: Estilos y efectos individuales
            type: object
            list: { collapsible: { collapsed: true, summary: "{fields.selector}" } }
            fields:
